name: MuleSoft CloudHub 2.0 CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # STEP 1: Cold installation phase to safely build up the core public cache
  install_dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache Public Maven Packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-public-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-public-maven-

      - name: Configure Global Maven Settings
        run: |
          mkdir -p ~/.m2
          cp .maven/settings.xml ~/.m2/settings.xml

      # Download all open-source and plugin assets without running logic or unit tests
      - name: Pre-install core plugins and dependencies
        env:
          ANYPOINT_CONNAPP_CLIENT_ID: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_ID }}
          ANYPOINT_CONNAPP_CLIENT_SECRET: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_SECRET }}
          ANYPOINT_PLATFORM_CLIENT_ID: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_ID }}
          ANYPOINT_PLATFORM_CLIENT_SECRET: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_SECRET }}
          MULE_ENV: ${{ vars.MULE_ENV }}
          MULE_SECURE_KEY: ${{ secrets.MULE_SECURE_KEY }}
        run: |
          mvn dependency:go-offline --file pom.xml --settings .maven/settings.xml \
            -Danypoint.connApp.clientId="$ANYPOINT_CONNAPP_CLIENT_ID" \
            -Danypoint.connApp.clientSecret="$ANYPOINT_CONNAPP_CLIENT_SECRET" \
            -Danypoint.platform.clientId="$ANYPOINT_PLATFORM_CLIENT_ID" \
            -Danypoint.platform.clientSecret="$ANYPOINT_PLATFORM_CLIENT_SECRET" \
            -Dmule.env="$MULE_ENV" \
            -Dsecure.key="$MULE_SECURE_KEY"

  # STEP 2: Strict execution stage leveraging the fresh public repository cache
  test:
    needs: install_dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache Public Maven Packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-public-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-public-maven-

      - name: Configure Global Maven Settings
        run: |
          mkdir -p ~/.m2
          cp .maven/settings.xml ~/.m2/settings.xml

      - name: Run MUnit Tests
        id: test_execution
        env:
          ANYPOINT_PLATFORM_CLIENT_ID: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_ID }}
          ANYPOINT_PLATFORM_CLIENT_SECRET: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_SECRET }}
          ANYPOINT_CONNAPP_CLIENT_ID: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_ID }}
          ANYPOINT_CONNAPP_CLIENT_SECRET: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_SECRET }}
          KEY: ${{ secrets.MULE_SECURE_KEY }}
          MULE_ENV: ${{ vars.MULE_ENV }}
        run: |
          mvn test --file pom.xml --settings .maven/settings.xml \
            -Dsecure.key="$KEY" \
            -Danypoint.platform.clientId="$ANYPOINT_PLATFORM_CLIENT_ID" \
            -Danypoint.platform.clientSecret="$ANYPOINT_PLATFORM_CLIENT_SECRET" \
            -Danypoint.connApp.clientId="$ANYPOINT_CONNAPP_CLIENT_ID" \
            -Danypoint.connApp.clientSecret="$ANYPOINT_CONNAPP_CLIENT_SECRET" \
            -Dmule.env="$MULE_ENV"

      - name: Upload MUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: munit-test-reports
          path: target/site/munit/coverage/

  # STEP 3: Compiles and structures final production package binary
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Configure Global Maven Settings
        run: |
          mkdir -p ~/.m2
          cp .maven/settings.xml ~/.m2/settings.xml

      - name: Build with Maven
        env:
          ANYPOINT_PLATFORM_CLIENT_ID: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_ID }}
          ANYPOINT_PLATFORM_CLIENT_SECRET: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_SECRET }}
          ANYPOINT_CONNAPP_CLIENT_ID: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_ID }}
          ANYPOINT_CONNAPP_CLIENT_SECRET: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_SECRET }}
          ENV: ${{ vars.ANYPOINT_ENV }}
          KEY: ${{ secrets.MULE_SECURE_KEY }}
        run: |
          mvn -B package --file pom.xml --settings .maven/settings.xml \
            -DskipMunitTests \
            -Danypoint.platform.clientId="$ANYPOINT_PLATFORM_CLIENT_ID" \
            -Danypoint.platform.clientSecret="$ANYPOINT_PLATFORM_CLIENT_SECRET" \
            -Danypoint.connApp.clientId="$ANYPOINT_CONNAPP_CLIENT_ID" \
            -Danypoint.connApp.clientSecret="$ANYPOINT_CONNAPP_CLIENT_SECRET" \
            -Dmule.env="$ENV" \
            -Dsecure.key="$KEY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: target/*.jar

  publish-to-exchange:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: target

      - name: Configure Global Maven Settings
        run: |
          mkdir -p ~/.m2
          cp .maven/settings.xml ~/.m2/settings.xml

      - name: Publish to Anypoint Exchange
        env:
          ANYPOINT_CONNAPP_CLIENT_ID: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_ID }}
          ANYPOINT_CONNAPP_CLIENT_SECRET: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_SECRET }}
          ANYPOINT_PLATFORM_CLIENT_ID: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_ID }}
          ANYPOINT_PLATFORM_CLIENT_SECRET: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_SECRET }}
        run: |
          mvn deploy --file pom.xml --settings .maven/settings.xml \
            -DskipTests \
            -DskipMuleDeployment=true \
            -Dmaven.main.skip=true \
            -Danypoint.connApp.clientId="$ANYPOINT_CONNAPP_CLIENT_ID" \
            -Danypoint.connApp.clientSecret="$ANYPOINT_CONNAPP_CLIENT_SECRET" \
            -Danypoint.platform.clientId="$ANYPOINT_PLATFORM_CLIENT_ID" \
            -Danypoint.platform.clientSecret="$ANYPOINT_PLATFORM_CLIENT_SECRET"

  deploy-to-cloudhub:
    needs: publish-to-exchange
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Configure Global Maven Settings
        run: |
          mkdir -p ~/.m2
          cp .maven/settings.xml ~/.m2/settings.xml

      - name: Deploy to CloudHub
        env:
          ANYPOINT_CONNAPP_CLIENT_ID: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_ID }}
          ANYPOINT_CONNAPP_CLIENT_SECRET: ${{ secrets.ANYPOINT_CONNAPP_CLIENT_SECRET }}
          ANYPOINT_PLATFORM_CLIENT_ID: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_ID }}
          ANYPOINT_PLATFORM_CLIENT_SECRET: ${{ secrets.ANYPOINT_PLATFORM_CLIENT_SECRET }}

          ANYPOINT_ENV: ${{ vars.ANYPOINT_ENV }}
          ANYPOINT_TARGET_SPACE: ${{ vars.ANYPOINT_TARGET_SPACE }}
          ANYPOINT_RUNTIME: ${{ vars.ANYPOINT_RUNTIME }}
          ANYPOINT_ORG_ID: ${{ vars.ANYPOINT_ORG_ID }}
          ANYPOINT_APP_NAME: ${{ vars.ANYPOINT_APP_NAME }}

          MULE_ENV: ${{ vars.MULE_ENV }}
          MULE_SECURE_KEY: ${{ secrets.MULE_SECURE_KEY }}

        run: |

          CLEAN_APP_NAME=$(echo "$ANYPOINT_APP_NAME" | tr -d '\r\n' | xargs)

          mvn mule:deploy --file pom.xml --settings .maven/settings.xml \
            -DskipTests \
            -Dmaven.main.skip=true \
            -Danypoint.platform.clientId="$ANYPOINT_PLATFORM_CLIENT_ID" \
            -Danypoint.platform.clientSecret="$ANYPOINT_PLATFORM_CLIENT_SECRET" \
            -Danypoint.connApp.clientId="$ANYPOINT_CONNAPP_CLIENT_ID" \
            -Danypoint.connApp.clientSecret="$ANYPOINT_CONNAPP_CLIENT_SECRET" \
            -Dmule.env="$MULE_ENV" \
            -Dsecure.key="$MULE_SECURE_KEY" \
            -Danypoint.env="$ANYPOINT_ENV" \
            -Danypoint.targetSpace="$ANYPOINT_TARGET_SPACE" \
            -Danypoint.runtime="$ANYPOINT_RUNTIME" \
            -Danypoint.orgId="$ANYPOINT_ORG_ID" \
            -Danypoint.appName="$CLEAN_APP_NAME"
