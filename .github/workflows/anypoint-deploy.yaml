name: MuleSoft CloudHub 2.0 CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu' 
        java-version: '17'


    - name: Cache Public Maven Packages
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-public-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-public-maven-

    - name: Configure Global Maven Settings
      run: |
        mkdir -p ~/.m2
        cp .maven/settings.xml ~/.m2/settings.xml

    - name: Run MUnit Tests
      id: test_execution
      continue-on-error: true # Prevents a 401 from killing the runner before caching happens
      env:
        ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
        ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }} 
        KEY: ${{ secrets.MULE_SECURE_KEY }} 
      run: |
        mvn test \
          -Dsecure.key="$KEY" \
          -Danypoint.clientId="$ANYPOINT_CLIENT_ID" \
          -Danypoint.clientSecret="$ANYPOINT_CLIENT_SECRET"

    - name: Isolate and Purge Private Exchange Group Dependencies
      if: always() # Runs even if the test step failed or hit a 401
      run: |
        echo "Purging private organization artifacts from cache folder..."
        # This targets your specific Anypoint Organization ID directory inside the local maven cache
        rm -rf ~/.m2/repository/365d8e9a-5b53-4d65-8776-8d29047c4ac6/
        echo "Private assets cleared. Local cache is now strictly public open-source plugins."

    - name: Check Test Execution Status
      if: steps.test_execution.outcome == 'failure'
      run: |
        echo "The build failed during compilation/dependency checking due to Anypoint Credentials."
        exit 1

    - name: Upload MUnit reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: munit-test-reports
        path: target/site/munit/coverage/
  
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven
      env:
        ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
        ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
      run: |
        mvn -B package --file pom.xml --settings .maven/settings.xml \
          -DskipMunitTests \
          -Danypoint.clientId="$ANYPOINT_CLIENT_ID" \
          -Danypoint.clientSecret="$ANYPOINT_CLIENT_SECRET"

    - name: Stamp artifact file name with commit hash
      run: |
        artifactName1=$(ls target/*.jar | head -1)
        commitHash=$(git rev-parse --short "$GITHUB_SHA")
        artifactName2=$(ls target/*.jar | head -1 | sed "s/.jar/-$commitHash.jar/g")
        mv $artifactName1 $artifactName2

    - name: Upload artifact 
      uses: actions/upload-artifact@v4
      with:
        name: artifacts
        path: target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:    
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Download built artifact
      uses: actions/download-artifact@v4
      with:
        name: artifacts

    - name: Package and Deploy to CloudHub 2.0
      env:  
        ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
        ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        MULE_SECURE_KEY: ${{ secrets.MULE_SECURE_KEY }}

        ANYPOINT_ORG_ID: ${{ vars.ANYPOINT_ORG_ID }}
        ANYPOINT_ENV: ${{ vars.ANYPOINT_ENV }}
        ANYPOINT_TARGET_SPACE: ${{ vars.ANYPOINT_TARGET_SPACE }}
        ANYPOINT_RUNTIME: ${{ vars.ANYPOINT_RUNTIME }}
        ANYPOINT_REGION: ${{ vars.ANYPOINT_REGION }}
        ANYPOINT_APP_NAME: ${{ vars.ANYPOINT_APP_NAME }}
      run: |
        artifactName=$(ls *.jar | head -1)
        mvn deploy -DmuleDeploy --settings .maven/settings.xml \
            -DskipTests \
            -Dmaven.main.skip=true \
            -Dmule.artifact=$artifactName \
            -Danypoint.clientId=$ANYPOINT_CLIENT_ID \
            -Danypoint.clientSecret=$ANYPOINT_CLIENT_SECRET \
            -Danypoint.orgId=$ANYPOINT_ORG_ID \
            -Dsecure.key=$MULE_SECURE_KEY \
            -Danypoint.env=$ANYPOINT_ENV \
            -Danypoint.targetSpace=$ANYPOINT_TARGET_SPACE \
            -Danypoint.runtime=$ANYPOINT_RUNTIME \
            -Danypoint.region=$ANYPOINT_REGION \
            -Danypoint.appName=$ANYPOINT_APP_NAME